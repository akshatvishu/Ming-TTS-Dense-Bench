async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 1
      model_stage: llm
      model_arch: MingTTSForConditionalGeneration
      hf_config_name: llm_config
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: false
      enable_prefix_caching: false
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.ming_tts.llm2audio_vae_async_chunk
    initial_prompt_processor: vllm_omni.model_executor.models.ming_tts.ingress.build_ming_ingress_processor
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 512
      detokenize: true
    output_connectors:
      to_stage_1: connector_of_shared_memory

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "0"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 1
      model_stage: audio_vae
      model_arch: MingTTSForConditionalGeneration
      hf_config_name: llm_config
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      gpu_memory_utilization: 0.25
      enforce_eager: true
      trust_remote_code: false
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      max_model_len: 8192
      max_num_batched_tokens: 8192
    engine_input_source: [0]
    is_comprehension: false
    final_output: true
    final_output_type: audio
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 1
      detokenize: false

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        # Benchmark-only TTFP experiment.
        #
        # Current production Ming uses latent_chunk_size=25. That means Stage 2
        # sees the first chunk only after ~25 decode steps. Each Ming decode step
        # corresponds to 4 * 4 latent/VAE frames, and each frame is 882 samples:
        #
        #   1 decode step = 4 * 4 * 882 = 14112 samples ~= 320 ms at 44.1 kHz
        #   5 decode steps ~= 1.6 s of audio
        #   25 decode steps ~= 8.0 s of audio
        #
        # Use 5 here to expose first audio much earlier while keeping VAE calls
        # large enough to avoid the worst per-chunk overhead. Also test 10 if
        # this is too overhead-heavy; use 25 as the baseline.
        latent_chunk_size: 5
        latent_left_context: 0

  edges:
    - from: 0
      to: 1
      window_size: -1
